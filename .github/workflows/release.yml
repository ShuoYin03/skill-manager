name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple code signing certificate
        if: ${{ env.CSC_LINK != '' }}
        run: |
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p "$CSC_KEY_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$CSC_KEY_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$CSC_KEY_PASSWORD" build.keychain
          rm certificate.p12
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build macOS app
        run: npm run build && npx electron-builder --mac --publish never
        env:
          # CSC_LINK/CSC_KEY_PASSWORD are intentionally NOT passed here.
          # When the secret is set, the cert is already imported into the keychain
          # by the previous step. Passing an empty CSC_LINK causes electron-builder
          # to treat it as a file path, resolving to the workspace dir ("not a file").
          # CSC_IDENTITY_AUTO_DISCOVERY=true lets it find the keychain cert when present.
          # When the secret is absent the import step is skipped and auto-discovery
          # finds nothing → electron-builder skips signing cleanly.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: sudo apt-get install -y libarchive-tools

      - name: Build Linux app
        run: npm run build && npx electron-builder --linux --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*.AppImage

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-dist/*.dmg
            artifacts/win-dist/*.exe
            artifacts/linux-dist/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
