appId: com.skilly
productName: Skilly
copyright: Copyright © 2026 Skilly

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - "!out/renderer/src/**"

extraMetadata:
  main: ./out/main/index.js

# macOS
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.developer-tools
  icon: resources/icon.png
  protocols:
    - name: Skilly
      schemes:
        - skilly

dmg:
  artifactName: "${productName}-${version}-mac.${ext}"
  iconSize: 80
  window:
    width: 540
    height: 360
  contents:
    - x: 130
      y: 170
      type: file
    - x: 410
      y: 170
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: "${productName}-${version}-win-setup.${ext}"

# Linux
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  icon: resources/icon.png
  mimeTypes:
    - x-scheme-handler/skilly

appImage:
  artifactName: "${productName}-${version}-linux.${ext}"

# Protocol registration for Windows
protocols:
  - name: Skilly
    schemes:
      - skilly
